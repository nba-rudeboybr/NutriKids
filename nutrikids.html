<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriKids – Educação Nutricional Interativa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#2e7d32;--green-light:#4caf50;--green-pale:#e8f5e9;
  --orange:#f57c00;--orange-light:#ff9800;--orange-pale:#fff3e0;
  --blue:#1565c0;--blue-light:#2196f3;--blue-pale:#e3f2fd;
  --pink:#c2185b;--pink-light:#e91e63;--pink-pale:#fce4ec;
  --yellow:#f9a825;--purple:#7b1fa2;
  --bg:#f5f9f5;--card:#fff;--border:#e0e0e0;
  --text:#212121;--muted:#757575;
  --radius:14px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 4px 24px rgba(0,0,0,.14);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{min-height:100vh}
button{cursor:pointer;border:none;font-family:inherit;font-size:1rem;transition:.2s}
input,select,textarea{font-family:inherit;font-size:1rem;border:2px solid var(--border);border-radius:var(--radius-sm);padding:.6rem .9rem;width:100%;outline:none;transition:.2s;background:#fff}
input:focus,select:focus,textarea:focus{border-color:var(--green-light)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.4rem;border-radius:var(--radius-sm);font-weight:600;transition:.2s}
.btn-primary{background:var(--green-light);color:#fff}.btn-primary:hover{background:var(--green)}
.btn-secondary{background:var(--orange-light);color:#fff}.btn-secondary:hover{background:var(--orange)}
.btn-outline{background:transparent;color:var(--green);border:2px solid var(--green-light)}.btn-outline:hover{background:var(--green-pale)}
.btn-danger{background:#e53935;color:#fff}.btn-danger:hover{background:#b71c1c}
.btn-blue{background:var(--blue-light);color:#fff}.btn-blue:hover{background:var(--blue)}
.btn-sm{padding:.4rem .9rem;font-size:.85rem}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:.75rem;font-weight:700}
.badge-green{background:var(--green-pale);color:var(--green)}
.badge-orange{background:var(--orange-pale);color:var(--orange)}
.badge-blue{background:var(--blue-pale);color:var(--blue)}
.badge-pink{background:var(--pink-pale);color:var(--pink)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-weight:600;margin-bottom:.35rem;font-size:.9rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.alert{padding:.8rem 1rem;border-radius:var(--radius-sm);margin-bottom:1rem;font-size:.9rem}
.alert-error{background:#ffebee;color:#c62828;border-left:4px solid #e53935}
.alert-success{background:var(--green-pale);color:var(--green);border-left:4px solid var(--green-light)}
.alert-info{background:var(--blue-pale);color:var(--blue);border-left:4px solid var(--blue-light)}
h1{font-size:1.8rem}h2{font-size:1.4rem}h3{font-size:1.1rem}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.flex{display:flex;align-items:center}.flex-between{display:flex;align-items:center;justify-content:space-between}
.gap-1{gap:.5rem}.gap-2{gap:1rem}
.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}.mt-3{margin-top:1.5rem}
.mb-1{margin-bottom:.5rem}.mb-2{margin-bottom:1rem}
.text-center{text-align:center}.text-muted{color:var(--muted)}
.progress-bar{height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:5px;background:var(--green-light);transition:width .5s}
.chip{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:20px;font-size:.8rem;font-weight:600;background:var(--green-pale);color:var(--green)}
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0}

/* NAV */
.navbar{background:var(--card);box-shadow:var(--shadow);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.navbar-brand{display:flex;align-items:center;gap:.5rem;font-size:1.3rem;font-weight:800;color:var(--green);cursor:pointer}
.navbar-brand span{font-size:1.6rem}
.navbar-links{display:flex;gap:.25rem}
.nav-link{padding:.5rem .9rem;border-radius:var(--radius-sm);font-weight:600;font-size:.9rem;cursor:pointer;color:var(--text);background:none;border:none;transition:.2s}
.nav-link:hover,.nav-link.active{background:var(--green-pale);color:var(--green)}
.nav-link.pro:hover,.nav-link.pro.active{background:var(--blue-pale);color:var(--blue)}
.user-menu{display:flex;align-items:center;gap:.75rem}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--green-light);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem}
.avatar.pro{background:var(--blue-light)}

/* LANDING */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#e8f5e9 0%,#fff3e0 50%,#e3f2fd 100%)}
.landing-logo{font-size:4rem;margin-bottom:.5rem}
.landing-title{font-size:2.8rem;font-weight:900;color:var(--green);margin-bottom:.5rem;text-align:center}
.landing-sub{font-size:1.1rem;color:var(--muted);margin-bottom:3rem;text-align:center;max-width:480px}
.role-cards{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;margin-bottom:2rem}
.role-card{background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);padding:2.5rem 2rem;cursor:pointer;transition:.25s;border:3px solid transparent;text-align:center;min-width:220px;max-width:260px}
.role-card:hover{transform:translateY(-6px);box-shadow:0 8px 32px rgba(0,0,0,.15)}
.role-card.kid:hover{border-color:var(--orange-light)}
.role-card.pro:hover{border-color:var(--blue-light)}
.role-card .icon{font-size:3.5rem;margin-bottom:1rem}
.role-card h2{margin-bottom:.5rem}
.role-card p{color:var(--muted);font-size:.9rem}
.landing-login{color:var(--muted);font-size:.9rem}
.landing-login a{color:var(--green);font-weight:600;cursor:pointer;text-decoration:underline}

/* AUTH */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--bg)}
.auth-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:2.5rem;width:100%;max-width:440px}
.auth-header{text-align:center;margin-bottom:2rem}
.auth-header .icon{font-size:2.5rem;margin-bottom:.5rem}
.auth-tabs{display:flex;background:#f5f5f5;border-radius:var(--radius-sm);padding:4px;margin-bottom:1.5rem}
.auth-tab{flex:1;padding:.5rem;border-radius:6px;text-align:center;cursor:pointer;font-weight:600;font-size:.9rem;transition:.2s;border:none;background:none}
.auth-tab.active{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* MAIN LAYOUT */
.main-layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:220px;background:#fff;border-right:1px solid var(--border);padding:1rem 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;flex-shrink:0}
.sidebar-nav{display:flex;flex-direction:column;gap:.1rem;padding:0 .5rem}
.sidebar-link{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-size:.95rem;transition:.2s;border:none;background:none;width:100%;color:var(--text)}
.sidebar-link:hover{background:var(--green-pale)}
.sidebar-link.active{background:var(--green-pale);color:var(--green)}
.sidebar-link.pro:hover,.sidebar-link.pro.active{background:var(--blue-pale);color:var(--blue)}
.sidebar-link .icon{font-size:1.2rem}
.content{flex:1;padding:1.5rem;overflow-y:auto;max-width:960px}

/* DASHBOARD KID */
.welcome-banner{background:linear-gradient(135deg,var(--green-light),var(--orange-light));color:#fff;border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.welcome-banner h1{font-size:1.5rem;margin-bottom:.25rem}
.welcome-banner p{opacity:.9;font-size:.95rem}
.welcome-banner .stars{position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:3rem;opacity:.3}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#fff;border-radius:var(--radius);padding:1rem;text-align:center;box-shadow:var(--shadow)}
.stat-card .stat-icon{font-size:2rem;margin-bottom:.25rem}
.stat-card .stat-val{font-size:1.8rem;font-weight:900;color:var(--green)}
.stat-card .stat-label{font-size:.8rem;color:var(--muted);font-weight:600}

/* GAME/QUIZ */
.quiz-container{max-width:600px;margin:0 auto}
.quiz-question{background:#fff;border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow);margin-bottom:1rem}
.quiz-q-number{font-size:.85rem;color:var(--muted);font-weight:600;margin-bottom:1rem}
.quiz-q-text{font-size:1.2rem;font-weight:700;margin-bottom:1.5rem;line-height:1.4}
.quiz-options{display:flex;flex-direction:column;gap:.75rem}
.quiz-option{padding:1rem 1.25rem;border-radius:var(--radius-sm);border:2px solid var(--border);background:#fff;cursor:pointer;font-size:1rem;text-align:left;transition:.2s;font-weight:500}
.quiz-option:hover{border-color:var(--green-light);background:var(--green-pale)}
.quiz-option.correct{border-color:var(--green-light);background:var(--green-pale);color:var(--green)}
.quiz-option.wrong{border-color:#e53935;background:#ffebee;color:#c62828}
.quiz-result{text-align:center;padding:2rem}
.quiz-score{font-size:4rem;font-weight:900;color:var(--green)}

/* RECIPES */
.recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
.recipe-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:.2s}
.recipe-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.recipe-img{height:140px;display:flex;align-items:center;justify-content:center;font-size:4rem}
.recipe-body{padding:1rem}
.recipe-body h3{margin-bottom:.5rem}
.recipe-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem}
.recipe-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.recipe-modal-card{background:#fff;border-radius:var(--radius);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:2rem}

/* CHALLENGES */
.challenge-card{background:#fff;border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow);margin-bottom:1rem}
.challenge-card .deadline{font-size:.85rem;color:var(--orange);font-weight:600}
.challenge-done{opacity:.6;text-decoration:none}

/* TRAILS */
.trail-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:1rem}
.trail-header{padding:1.25rem;cursor:pointer;display:flex;align-items:center;gap:1rem}
.trail-header .icon{font-size:2rem}
.trail-modules{padding:0 1.25rem 1.25rem;display:flex;flex-direction:column;gap:.75rem}
.module-item{padding:.9rem 1rem;border-radius:var(--radius-sm);border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:.75rem;transition:.2s}
.module-item:hover{border-color:var(--green-light);background:var(--green-pale)}
.module-item.done{border-color:var(--green-light);background:var(--green-pale)}
.module-item .check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem}
.module-item.done .check{background:var(--green-light);border-color:var(--green-light);color:#fff}
.module-detail{background:#fff;border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);margin-top:1rem;line-height:1.7}

/* ACHIEVEMENTS */
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem}
.badge-card{background:#fff;border-radius:var(--radius);padding:1.25rem;text-align:center;box-shadow:var(--shadow)}
.badge-card .icon{font-size:2.5rem;margin-bottom:.5rem}
.badge-card.locked{opacity:.35;filter:grayscale(1)}
.badge-card h4{font-size:.85rem;font-weight:700}
.badge-card p{font-size:.75rem;color:var(--muted);margin-top:.2rem}

/* PRO PORTAL */
.pro-banner{background:linear-gradient(135deg,var(--blue-light),var(--purple));color:#fff;border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.pro-banner h1{margin-bottom:.25rem}
.code-box{background:rgba(255,255,255,.2);border-radius:var(--radius-sm);padding:.5rem 1rem;display:inline-block;font-size:1.5rem;font-weight:900;letter-spacing:.15em;cursor:pointer;margin-top:.5rem}
.code-box:hover{background:rgba(255,255,255,.3)}
.group-card{background:#fff;border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow);margin-bottom:1rem}
.member-list{display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem}
.member-item{display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;background:var(--bg);border-radius:var(--radius-sm)}
.member-item .av{width:30px;height:30px;border-radius:50%;background:var(--green-light);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem}
.indicator-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem}
.indicator-card{background:#fff;border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow);text-align:center}
.indicator-card .val{font-size:2.2rem;font-weight:900;color:var(--blue-light)}
.indicator-card .lbl{font-size:.8rem;color:var(--muted);font-weight:600;margin-top:.2rem}
.challenge-row{display:flex;align-items:center;justify-content:space-between;padding:1rem;background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow);margin-bottom:.75rem}
.library-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
.library-card{background:#fff;border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.library-card .lc-icon{font-size:2rem;margin-bottom:.5rem}
.notes-list{display:flex;flex-direction:column;gap:.75rem}
.note-item{background:#fff;border-radius:var(--radius-sm);padding:1rem;box-shadow:var(--shadow);border-left:4px solid var(--blue-light)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-card{background:#fff;border-radius:var(--radius);padding:2rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);line-height:1}

/* MODULE READER */
.module-reader{background:#fff;border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow);max-width:700px;margin:0 auto;line-height:1.75;font-size:1.05rem}
.module-reader h2{color:var(--green);margin-bottom:1rem}
.module-reader .tip{background:var(--orange-pale);border-left:4px solid var(--orange-light);padding:1rem;border-radius:var(--radius-sm);margin:1rem 0}
.module-reader .fact{background:var(--green-pale);border-left:4px solid var(--green-light);padding:1rem;border-radius:var(--radius-sm);margin:1rem 0}
.module-reader ul{padding-left:1.5rem;margin:.5rem 0}
.module-reader ul li{margin:.3rem 0}

/* PROFILE */
.profile-page{max-width:560px;margin:0 auto}
.profile-avatar-big{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),var(--orange-light));color:#fff;font-size:2rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
.level-bar{margin-top:.5rem}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#333;color:#fff;padding:.85rem 1.5rem;border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);z-index:999;font-size:.95rem;animation:slideup .3s ease}
.toast.success{background:var(--green)}
.toast.error{background:#e53935}
@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:700px){
  .sidebar{display:none}
  .form-row{grid-template-columns:1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .role-cards{flex-direction:column;align-items:center}
  .stats-row{grid-template-columns:1fr 1fr}
  .content{padding:1rem}
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// =========================================================
//  DATABASE (Supabase relacional + cache em memória)
// =========================================================
const SUPABASE_URL='https://jnwmzfnegvgwhvlufbpi.supabase.co';
const SUPABASE_KEY='sb_publishable_YZHNdfWgltQ3Cxkw2l0KXw_CUIUASXU';
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const _cache={session:null};

function mapProfile(r){
  return{id:r.id,name:r.name,email:r.email,role:r.role,age:r.age,activity:r.activity,institution:r.institution,groupId:r.group_id,points:r.points||0,badges:r.badges||[],createdAt:r.created_at};
}
function mapGroup(r){
  return{id:r.id,name:r.name,desc:r.description||'',code:r.code,ownerId:r.owner_id,createdAt:r.created_at};
}
function mapChallenge(r){
  return{id:r.id,title:r.title,description:r.description,groupId:r.group_id,dueDate:r.due_date,materials:r.materials||[],ownerId:r.owner_id,createdAt:r.created_at};
}
function mapCompletion(r){
  return{id:r.id,challengeId:r.challenge_id,userId:r.user_id,completedAt:r.completed_at};
}
function mapProgress(r){
  return{completedModules:r.completed_modules||[],completedTrails:r.completed_trails||[],recipesViewed:r.recipes_viewed||0,totalCorrect:r.total_correct||0,quizzesDone:r.quizzes_done||0,challengesDone:r.challenges_done||0};
}
function mapLibrary(r){
  return{id:r.id,title:r.title,type:r.type,desc:r.description||'',link:r.link||'',createdAt:r.created_at};
}
function mapNote(r){
  return{id:r.id,title:r.title,content:r.content,groupId:r.group_id||'',createdAt:r.created_at};
}
function profileRow(u){
  return{id:u.id,name:u.name,email:u.email,role:u.role,age:u.age??null,activity:u.activity??null,institution:u.institution??null,group_id:u.groupId??null,points:u.points??0,badges:u.badges??[],created_at:u.createdAt||new Date().toISOString()};
}
function groupRow(g){
  return{id:g.id,name:g.name,description:g.desc||'',code:g.code,owner_id:g.ownerId,created_at:g.createdAt||new Date().toISOString()};
}
function challengeRow(c){
  return{id:c.id,title:c.title,description:c.description,group_id:c.groupId,due_date:c.dueDate,materials:c.materials||[],owner_id:c.ownerId,created_at:c.createdAt||new Date().toISOString()};
}
function completionRow(c){
  return{id:c.id,challenge_id:c.challengeId,user_id:c.userId,completed_at:c.completedAt||new Date().toISOString()};
}
function progressRow(uid,p){
  return{user_id:uid,completed_modules:p.completedModules||[],completed_trails:p.completedTrails||[],recipes_viewed:p.recipesViewed||0,total_correct:p.totalCorrect||0,quizzes_done:p.quizzesDone||0,challenges_done:p.challengesDone||0};
}
function libraryRow(uid,item){
  return{id:item.id,owner_id:uid,title:item.title,type:item.type||'Texto',description:item.desc||'',link:item.link||'',created_at:item.createdAt||new Date().toISOString()};
}
function noteRow(uid,n){
  return{id:n.id,owner_id:uid,title:n.title,content:n.content,group_id:n.groupId||null,created_at:n.createdAt||new Date().toISOString()};
}

const DB = {
  _clear(){
    _cache.session=null;
    _cache.users=[];
    _cache.groups=[];
    _cache.challenges=[];
    _cache.completions=[];
    Object.keys(_cache).forEach(k=>{
      if(k.startsWith('progress_')||k.startsWith('library_')||k.startsWith('notes_'))delete _cache[k];
    });
  },
  get(k){
    if(k==='session')return _cache.session;
    return _cache[k]??null;
  },
  set(k,v){
    if(k==='session'){_cache.session=v;return;}
    _cache[k]=v;
    this._persist(k,v);
  },
  list(k){return this.get(k)||[]},
  add(k,item){
    const l=this.list(k);l.push(item);_cache[k]=l;
    this._insert(k,item);
    return item;
  },
  update(k,id,patch){
    const l=this.list(k);
    const i=l.findIndex(x=>x.id===id);
    if(i>-1){l[i]={...l[i],...patch};_cache[k]=l;this._updateRow(k,l[i]);}
  },
  remove(k,id){
    _cache[k]=this.list(k).filter(x=>x.id!==id);
    this._deleteRow(k,id);
  },
  currentUser(){return _cache.session},
  login(u){_cache.session=u},
  async logout(){this._clear();await supabaseClient.auth.signOut()},
  uid(){return crypto.randomUUID?crypto.randomUUID():'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)},
  async lookupGroupByCode(code){
    const {data,error}=await supabaseClient.rpc('lookup_group_by_code',{p_code:code});
    if(error||!data?.length)return null;
    return{id:data[0].id,name:data[0].name,code:data[0].code};
  },
  async init(){
    const {data:{session}}=await supabaseClient.auth.getSession();
    if(session?.user)await this.loadRemote();
    else this._clear();
    if(session?.user){
      const profile=this.list('users').find(u=>u.id===session.user.id);
      if(profile)this.login(profile);
    }
  },
  async loadRemote(){
    const {data:{session}}=await supabaseClient.auth.getSession();
    if(!session?.user){this._clear();return;}
    const uid=session.user.id;
    this._clear();
    const {data:me,error:meErr}=await supabaseClient.from('profiles').select('*').eq('id',uid).maybeSingle();
    if(meErr||!me)return;
    const users=[mapProfile(me)];
    _cache.groups=[];
    _cache.challenges=[];
    _cache.completions=[];
    if(me.role==='pro'){
      const {data:groups}=await supabaseClient.from('groups').select('*').eq('owner_id',uid);
      _cache.groups=(groups||[]).map(mapGroup);
      const groupIds=_cache.groups.map(g=>g.id);
      if(groupIds.length){
        const {data:kids}=await supabaseClient.from('profiles').select('*').eq('role','kid').in('group_id',groupIds);
        users.push(...(kids||[]).map(mapProfile));
        const {data:chals}=await supabaseClient.from('challenges').select('*').in('group_id',groupIds);
        _cache.challenges=(chals||[]).map(mapChallenge);
        const kidIds=(kids||[]).map(k=>k.id);
        if(kidIds.length){
          const {data:comps}=await supabaseClient.from('completions').select('*').in('user_id',kidIds);
          _cache.completions=(comps||[]).map(mapCompletion);
          for(const kid of kids||[])await this._loadProgress(kid.id);
        }
      }
      await this._loadLibrary(uid);
      await this._loadNotes(uid);
    }else{
      if(me.group_id){
        const {data:group}=await supabaseClient.from('groups').select('*').eq('id',me.group_id).maybeSingle();
        if(group)_cache.groups=[mapGroup(group)];
        const {data:chals}=await supabaseClient.from('challenges').select('*').eq('group_id',me.group_id);
        _cache.challenges=(chals||[]).map(mapChallenge);
      }
      const {data:comps}=await supabaseClient.from('completions').select('*').eq('user_id',uid);
      _cache.completions=(comps||[]).map(mapCompletion);
      await this._loadProgress(uid);
    }
    _cache.users=users;
  },
  async _loadProgress(uid){
    const {data}=await supabaseClient.from('progress').select('*').eq('user_id',uid).maybeSingle();
    _cache['progress_'+uid]=data?mapProgress(data):{completedModules:[],completedTrails:[],recipesViewed:0,totalCorrect:0,quizzesDone:0,challengesDone:0};
  },
  async _loadLibrary(uid){
    const {data}=await supabaseClient.from('library_items').select('*').eq('owner_id',uid).order('created_at',{ascending:false});
    _cache['library_'+uid]=(data||[]).map(mapLibrary);
  },
  async _loadNotes(uid){
    const {data}=await supabaseClient.from('notes').select('*').eq('owner_id',uid).order('created_at',{ascending:false});
    _cache['notes_'+uid]=(data||[]).map(mapNote);
  },
  async _insert(k,item){
    let error;
    if(k==='users')({error}=await supabaseClient.from('profiles').insert(profileRow(item)));
    else if(k==='groups')({error}=await supabaseClient.from('groups').insert(groupRow(item)));
    else if(k==='challenges')({error}=await supabaseClient.from('challenges').insert(challengeRow(item)));
    else if(k==='completions')({error}=await supabaseClient.from('completions').insert(completionRow(item)));
    if(error)console.warn('Falha ao inserir',k,error.message);
  },
  async _updateRow(k,item){
    let error;
    if(k==='users')({error}=await supabaseClient.from('profiles').update(profileRow(item)).eq('id',item.id));
    else if(k==='groups')({error}=await supabaseClient.from('groups').update(groupRow(item)).eq('id',item.id));
    else if(k==='challenges')({error}=await supabaseClient.from('challenges').update(challengeRow(item)).eq('id',item.id));
    if(error)console.warn('Falha ao atualizar',k,error.message);
  },
  async _deleteRow(k,id){
    let error;
    if(k==='groups')({error}=await supabaseClient.from('groups').delete().eq('id',id));
    else if(k==='challenges')({error}=await supabaseClient.from('challenges').delete().eq('id',id));
    else if(k==='completions')({error}=await supabaseClient.from('completions').delete().eq('id',id));
    if(error)console.warn('Falha ao excluir',k,error.message);
  },
  async _persist(k,v){
    if(k.startsWith('progress_')){
      const uid=k.slice(9);
      const {error}=await supabaseClient.from('progress').upsert(progressRow(uid,v));
      if(error)console.warn('Falha ao salvar progresso',error.message);
    }else if(k.startsWith('library_')){
      const uid=k.slice(8);
      const {data:existing}=await supabaseClient.from('library_items').select('id').eq('owner_id',uid);
      const ids=new Set((v||[]).map(i=>i.id));
      const toDelete=(existing||[]).filter(r=>!ids.has(r.id)).map(r=>r.id);
      if(toDelete.length)await supabaseClient.from('library_items').delete().in('id',toDelete);
      if(v?.length){
        const {error}=await supabaseClient.from('library_items').upsert(v.map(i=>libraryRow(uid,i)));
        if(error)console.warn('Falha ao salvar biblioteca',error.message);
      }
    }else if(k.startsWith('notes_')){
      const uid=k.slice(6);
      const {data:existing}=await supabaseClient.from('notes').select('id').eq('owner_id',uid);
      const ids=new Set((v||[]).map(n=>n.id));
      const toDelete=(existing||[]).filter(r=>!ids.has(r.id)).map(r=>r.id);
      if(toDelete.length)await supabaseClient.from('notes').delete().in('id',toDelete);
      if(v?.length){
        const {error}=await supabaseClient.from('notes').upsert(v.map(n=>noteRow(uid,n)));
        if(error)console.warn('Falha ao salvar observações',error.message);
      }
    }
  }
};

function addPoints(n){
  const u=DB.currentUser();if(!u||u.role!=='kid')return;
  u.points=(u.points||0)+n;
  DB.login(u);DB.update('users',u.id,{points:u.points});
  toast('+'+n+' pontos! 🌟');
  checkBadges(u);
}
function checkBadges(u){
  const prog=DB.get('progress_'+u.id)||{};
  const badges=u.badges||[];
  const totalQ=(prog.totalCorrect||0);
  const recipes=prog.recipesViewed||0;
  const doneMods=(prog.completedModules||[]).length;
  const trailsDone=(prog.completedTrails||[]).length;
  const challengesDone=(prog.challengesDone||0);
  const newBadges=[];
  if(!badges.includes('b1'))newBadges.push('b1');
  if(totalQ>=5&&!badges.includes('b2'))newBadges.push('b2');
  if(totalQ>=10&&!badges.includes('b3'))newBadges.push('b3');
  if(recipes>=3&&!badges.includes('b7'))newBadges.push('b7');
  if(doneMods>=1&&!badges.includes('b5'))newBadges.push('b5');
  if(trailsDone>=1&&!badges.includes('b6'))newBadges.push('b6');
  if(trailsDone>=1&&(prog.completedTrails||[]).includes('t2')&&!badges.includes('b8'))newBadges.push('b8');
  if(challengesDone>=1&&!badges.includes('b9'))newBadges.push('b9');
  if((u.points||0)>=100&&!badges.includes('b10'))newBadges.push('b10');
  if(newBadges.length){
    const all=[...badges,...newBadges];
    u.badges=all;DB.login(u);DB.update('users',u.id,{badges:all});
    newBadges.forEach(b=>{const def=BADGES_DEF.find(x=>x.id===b);if(def)toast(def.icon+' Conquista: '+def.name,'success')});
  }
}
function getProgress(uid){return DB.get('progress_'+uid)||{completedModules:[],completedTrails:[],recipesViewed:0,totalCorrect:0,quizzesDone:0,challengesDone:0}}
function saveProgress(uid,patch){const p=getProgress(uid);DB.set('progress_'+uid,{...p,...patch})}

async _handleAuth(role,tab){
  const email=$('f-email')?.value.trim();
  const pass=$('f-pass')?.value.trim();
  const msgEl=$('auth-msg');
  if(!email||!pass){msgEl.innerHTML='<div class="alert alert-error">Preencha e-mail e senha.</div>';return;}
  const btn=$('auth-form-submit');
  if(btn){btn.disabled=true;btn.textContent=tab==='login'?'Entrando...':'Criando conta...'}
  if(tab==='login'){
    const {data,error}=await supabaseClient.auth.signInWithPassword({email,password:pass});
    if(error){
      msgEl.innerHTML='<div class="alert alert-error">E-mail ou senha incorretos.</div>';
      if(btn){btn.disabled=false;btn.textContent='Entrar'}
      return;
    }
    await DB.loadRemote();
    let u=DB.list('users').find(x=>x.id===data.user.id);
    const meta=data.user.user_metadata||{};
    if(!u&&meta.role===role){
      u={id:data.user.id,name:meta.name||email.split('@')[0],email:data.user.email||email,role,points:0,badges:[],createdAt:meta.createdAt||new Date().toISOString()};
      if(role==='kid'){
        u.age=meta.age||12;
        u.activity=meta.activity||'medio';
        if(meta.groupId)u.groupId=meta.groupId;
      }else{
        u.institution=meta.institution||'';
      }
      DB.add('users',u);
      saveProgress(u.id,{});
    }
    if(!u||u.role!==role){
      await DB.logout();
      msgEl.innerHTML='<div class="alert alert-error">Esta conta não pertence a este tipo de acesso.</div>';
      if(btn){btn.disabled=false;btn.textContent='Entrar'}
      return;
    }
    DB.login(u);
    role==='kid'?nav('kid-dashboard'):nav('pro-dashboard');
  } else {
    const name=$('f-name')?.value.trim();
    if(!name){
      msgEl.innerHTML='<div class="alert alert-error">Informe seu nome.</div>';
      if(btn){btn.disabled=false;btn.textContent='Criar Conta'}
      return;
    }
    const profile={name,email,role,points:0,badges:[],createdAt:new Date().toISOString()};
    let linkedGroup=null;
    if(role==='kid'){
      profile.age=parseInt($('f-age')?.value)||12;
      profile.activity=$('f-activity')?.value||'medio';
      const code=$('f-code')?.value.trim().toUpperCase();
      if(code){
        linkedGroup=await DB.lookupGroupByCode(code);
        if(linkedGroup){profile.groupId=linkedGroup.id;}
        else{
          msgEl.innerHTML='<div class="alert alert-error">Código de turma inválido.</div>';
          if(btn){btn.disabled=false;btn.textContent='Criar Conta'}
          return;
        }
      }
    } else {
      profile.institution=$('f-inst')?.value.trim()||'';
    }
    const {data,error}=await supabaseClient.auth.signUp({
      email,
      password:pass,
      options:{
        data:profile,
        emailRedirectTo:window.location.origin
      }
    });
    if(error){
      msgEl.innerHTML='<div class="alert alert-error">'+error.message+'</div>';
      if(btn){btn.disabled=false;btn.textContent='Criar Conta'}
      return;
    }
    if(!data.session){
      msgEl.innerHTML='<div class="alert alert-info">Conta criada. Confirme seu e-mail antes de entrar.</div>';
      if(btn){btn.disabled=false;btn.textContent='Criar Conta'}
      return;
    }
    const u={id:data.user.id,...profile};
    DB.add('users',u);DB.login(u);
    _cache.users=[u];
    if(u.groupId&&linkedGroup){
      _cache.groups=[{id:linkedGroup.id,name:linkedGroup.name,code:linkedGroup.code,desc:'',ownerId:'',createdAt:new Date().toISOString()}];
      toast('Turma vinculada: '+linkedGroup.name+'!');
    }
    saveProgress(u.id,{});
    checkBadges(u);
    role==='kid'?nav('kid-dashboard'):nav('pro-dashboard');
  }
},

// ---------- KID QUIZ ----------
kidQuiz(){
  const u=DB.currentUser();
  if(!u||u.role!=='kid'){nav('landing');return;}
  const questions=[...QUIZ].sort(()=>Math.random()-.5).slice(0,10);
  let current=0,score=0,answered=false;

  const showQ=()=>{
    const q=questions[current];
    $('quiz-area').innerHTML=`
    <div class="quiz-question">
      <div class="quiz-q-number">Pergunta ${current+1} de ${questions.length}</div>
      <div class="progress-bar mb-2"><div class="progress-fill" style="width:${(current/questions.length)*100}%"></div></div>
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((o,i)=>`<button class="quiz-option" data-i="${i}" onclick="window._quizAns(${i})">${o}</button>`).join('')}
      </div>
      <div id="quiz-exp" style="margin-top:1rem"></div>
    </div>`;
    answered=false;
  };

  window._quizAns=(i)=>{
    if(answered)return;answered=true;
    const q=questions[current];
    document.querySelectorAll('.quiz-option').forEach((b,idx)=>{
      b.disabled=true;
      if(idx===q.c)b.classList.add('correct');
      else if(idx===i)b.classList.add('wrong');
    });
    if(i===q.c){score++;addPoints(5);}
    $('quiz-exp').innerHTML=`<div class="alert ${i===q.c?'alert-success':'alert-error'}">${i===q.c?'✅ Correto! ':'❌ Errado! '}${q.exp}</div>`;
    setTimeout(()=>{
      current++;
      if(current<questions.length){showQ();}
      else{
        const prog=getProgress(u.id);
        saveProgress(u.id,{quizzesDone:(prog.quizzesDone||0)+1,totalCorrect:(prog.totalCorrect||0)+score});
        if(score===questions.length)addPoints(20);
        const pct=Math.round(score/questions.length*100);
        const msg=pct>=80?'🎉 Excelente! Você é um mestre da nutrição!':pct>=60?'👍 Muito bom! Continue praticando!':'💪 Não desista! Tente novamente!';
        $('quiz-area').innerHTML=`
        <div class="quiz-result">
          <div class="quiz-score">${score}/${questions.length}</div>
          <h2>${msg}</h2>
          <p class="text-muted mt-1">${pct}% de acertos · ${score*5} pontos ganhos</p>
          <div style="display:flex;gap:1rem;justify-content:center;margin-top:1.5rem">
            <button class="btn btn-primary" onclick="nav('kid-quiz')">🔄 Jogar Novamente</button>
            <button class="btn btn-outline" onclick="nav('kid-dashboard')">🏠 Início</button>
          </div>
        </div>`;
        checkBadges({...u,points:(u.points||0)+score*5});
      }
    },1800);
  };

  render(this._kidNav('quiz')+`
  <div style="padding:1.5rem">
    <div class="quiz-container">
      <div class="flex-between mb-2">
        <h2>🎮 Quiz de Nutrição</h2>
        <button class="btn btn-outline btn-sm" onclick="nav('kid-dashboard')">← Voltar</button>
      </div>
      <div id="quiz-area"></div>
    </div>
  </div>`);

},

// ---------- KID MODULE ----------
kidModule(d){
  const u=DB.currentUser();
  if(!u||u.role!=='kid'){nav('landing');return;}
  const trail=TRAILS.find(t=>t.id===d.trail);
  const mod=trail?.modules.find(m=>m.id===d.module);
  if(!mod){nav('kid-trails');return;}
  const prog=getProgress(u.id);
  const done=(prog.completedModules||[]).includes(mod.id);

  render(this._kidNav('trails')+`
  <div style="padding:1.5rem">
    <div style="max-width:700px;margin:0 auto">
      <div class="flex-between mb-2">
        <button class="btn btn-outline btn-sm" onclick="nav('kid-trails')">← Trilhas</button>
        ${done?'<span class="badge badge-green">✅ Concluído</span>':''}
      </div>
      <div class="module-reader">${mod.content}</div>
      ${!done?`<div style="text-align:center;margin-top:1.5rem">
        <button class="btn btn-primary" onclick="Views._completeModule('${d.trail}','${d.module}')">✅ Marcar como concluído (+10 pts)</button>
      </div>`:`<div style="text-align:center;margin-top:1.5rem">
        <button class="btn btn-outline" onclick="nav('kid-trails')">← Voltar às trilhas</button>
      </div>`}
    </div>
  </div>`);
},
_completeModule(trailId,modId){
  const u=DB.currentUser();
  const prog=getProgress(u.id);
  const mods=[...(prog.completedModules||[]),modId];
  const trail=TRAILS.find(t=>t.id===trailId);
  const allDone=trail.modules.every(m=>mods.includes(m.id));
  const trails=allDone?[...(prog.completedTrails||[]),trailId]:(prog.completedTrails||[]);
  saveProgress(u.id,{completedModules:mods,completedTrails:trails});
  addPoints(10);
  if(allDone){addPoints(20);toast('🎓 Trilha completa! +20 pontos bônus!');}
  checkBadges({...u,badges:u.badges||[]});
  nav('kid-trails');
},

async _joinGroup(){
  const u=DB.currentUser();
  const code=$('code-inp')?.value.trim().toUpperCase();

  if(!g){$('group-msg').innerHTML='<div class="alert alert-error">Código inválido.</div>';return;}
  u.groupId=g.id;DB.login(u);DB.update('users',u.id,{groupId:g.id});
  if(!DB.list('groups').find(x=>x.id===g.id)){
    _cache.groups=[...DB.list('groups'),{id:g.id,name:g.name,code:g.code,desc:'',ownerId:'',createdAt:new Date().toISOString()}];
  }
  await DB.loadRemote();
  const refreshed=DB.list('users').find(x=>x.id===u.id)||u;
  DB.login(refreshed);
  toast('Entrou na turma: '+g.name+'!');nav('kid-profile');
},

        ${c.materials&&c.materials.length?`<p class="mt-1 text-muted" style="font-size:.85rem">📎 ${c.materials.join(' · ')}</p>`:''}
        <div class="mt-2">
          <div class="flex-between mb-1"><span style="font-size:.85rem"><strong>${done}/${members.length}</strong> alunos concluíram</span><span class="badge ${pct>=80?'badge-green':pct>=50?'badge-orange':'badge-pink'}">${pct}%</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct>=80?'var(--green-light)':pct>=50?'var(--orange-light)':'var(--pink-light)'}"></div></div>
        </div>
      </div>`;
    }).join('')}
  </div>`);
},
_showChalModal(){
  const u=DB.currentUser();
  const groups=DB.list('groups').filter(g=>g.ownerId===u.id);
  const libs=DB.list('library_'+u.id)||[];
  if(!groups.length){toast('Crie uma turma primeiro!','error');nav('pro-groups');return;}
  document.body.insertAdjacentHTML('beforeend',`
  <div class="modal-overlay" id="cmod" onclick="if(event.target.id==='cmod')document.getElementById('cmod').remove()">
    <div class="modal-card">
      <div class="modal-header"><h3>Novo Desafio</h3><button class="modal-close" onclick="document.getElementById('cmod').remove()">×</button></div>
      <div id="cmod-msg"></div>
      <div class="form-group"><label>Título</label><input id="c-title" placeholder="Ex: Semana da Hidratação"></div>
      <div class="form-group"><label>Descrição</label><textarea id="c-desc" rows="3" placeholder="O que os alunos devem fazer?"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Turma</label>
          <select id="c-group">${groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label>Prazo</label><input id="c-date" type="date" min="${new Date().toISOString().split('T')[0]}"></div>
      </div>
      ${libs.length?`<div class="form-group"><label>Materiais da biblioteca</label>
        <select id="c-mat" multiple style="height:80px">${libs.map(l=>`<option value="${l.title}">${l.title}</option>`).join('')}</select>
        <p class="text-muted" style="font-size:.8rem">Segure Ctrl para selecionar vários</p>
      </div>`:''}
      <button class="btn btn-blue" style="width:100%;justify-content:center" onclick="Views._createChal()">Publicar Desafio</button>
    </div>
  </div>`);
},
_createChal(){
  const u=DB.currentUser();
  const title=$('c-title')?.value.trim();
  const desc=$('c-desc')?.value.trim();
  const gid=$('c-group')?.value;
  const date=$('c-date')?.value;
  if(!title||!desc||!date){$('cmod-msg').innerHTML='<div class="alert alert-error">Preencha todos os campos.</div>';return;}
  const matEl=$('c-mat');
  const materials=matEl?[...matEl.selectedOptions].map(o=>o.value):[];
  DB.add('challenges',{id:DB.uid(),title,description:desc,groupId:gid,dueDate:date,materials,createdAt:new Date().toISOString(),ownerId:u.id});
  $('cmod')?.remove();toast('Desafio publicado!');nav('pro-challenges');
},
_deleteChal(id){
  if(!confirm('Excluir este desafio?'))return;
  DB.remove('challenges',id);toast('Desafio excluído.');nav('pro-challenges');
},

// ---------- PRO LIBRARY ----------
proLibrary(){
  const u=DB.currentUser();
  if(!u||u.role!=='pro'){nav('landing');return;}
  const items=DB.list('library_'+u.id)||[];
  const TYPES=[{icon:'📄',label:'Texto'},{icon:'🖼️',label:'Imagem'},{icon:'🎥',label:'Vídeo'},{icon:'📊',label:'Infográfico'},{icon:'📝',label:'Atividade'}];
  render(this._proNav('library')+`
  <div style="padding:1.5rem;max-width:900px;margin:0 auto">
    <div class="flex-between mb-2">
      <h2>📚 Biblioteca de Materiais</h2>
      <button class="btn btn-blue" onclick="Views._showLibModal()">+ Adicionar Material</button>
    </div>
    <div class="alert alert-info">Adicione materiais educativos aqui para usar nos desafios das suas turmas.</div>
    ${items.length===0?'<div class="card text-center text-muted"><p style="font-size:2rem">📚</p><p>Nenhum material adicionado.</p></div>'
    :`<div class="library-grid">${items.map(it=>`
      <div class="library-card">
        <div class="lc-icon">${TYPES.find(t=>t.label===it.type)?.icon||'📄'}</div>
        <h3 style="font-size:.95rem">${it.title}</h3>
        <p class="text-muted" style="font-size:.8rem;margin-top:.3rem">${it.type} · ${fmtDate(it.createdAt)}</p>
        ${it.desc?`<p style="font-size:.85rem;margin-top:.5rem">${it.desc}</p>`:''}
        <button class="btn btn-danger btn-sm mt-2" onclick="Views._deleteLib('${it.id}')">Excluir</button>
      </div>`).join('')}</div>`}
  </div>`);
},
_showLibModal(){
  document.body.insertAdjacentHTML('beforeend',`
  <div class="modal-overlay" id="lmod" onclick="if(event.target.id==='lmod')document.getElementById('lmod').remove()">
    <div class="modal-card">
      <div class="modal-header"><h3>Novo Material</h3><button class="modal-close" onclick="document.getElementById('lmod').remove()">×</button></div>
      <div id="lmod-msg"></div>
      <div class="form-group"><label>Título</label><input id="l-title" placeholder="Nome do material"></div>
      <div class="form-group"><label>Tipo</label>
        <select id="l-type"><option>Texto</option><option>Imagem</option><option>Vídeo</option><option>Infográfico</option><option>Atividade</option></select>
      </div>
      <div class="form-group"><label>Descrição</label><textarea id="l-desc" rows="3" placeholder="Sobre este material..."></textarea></div>
      <div class="form-group"><label>Link (opcional)</label><input id="l-link" placeholder="https://..."></div>
      <button class="btn btn-blue" style="width:100%;justify-content:center" onclick="Views._addLib()">Salvar Material</button>
    </div>
  </div>`);
},
_addLib(){
  const u=DB.currentUser();
  const title=$('l-title')?.value.trim();
  if(!title){$('lmod-msg').innerHTML='<div class="alert alert-error">Informe o título.</div>';return;}
  const item={id:DB.uid(),title,type:$('l-type')?.value||'Texto',desc:$('l-desc')?.value.trim(),link:$('l-link')?.value.trim(),createdAt:new Date().toISOString()};
  const lib=DB.list('library_'+u.id)||[];
  lib.push(item);DB.set('library_'+u.id,lib);
  $('lmod')?.remove();toast('Material adicionado!');nav('pro-library');
},
_deleteLib(id){
  const u=DB.currentUser();
  const lib=(DB.list('library_'+u.id)||[]).filter(x=>x.id!==id);
  DB.set('library_'+u.id,lib);toast('Material excluído.');nav('pro-library');
},

// ---------- PRO NOTES ----------
proNotes(){
  const u=DB.currentUser();
  if(!u||u.role!=='pro'){nav('landing');return;}
  const notes=DB.list('notes_'+u.id)||[];
  const groups=DB.list('groups').filter(g=>g.ownerId===u.id);
  render(this._proNav('notes')+`
  <div style="padding:1.5rem;max-width:800px;margin:0 auto">
    <div class="flex-between mb-2">
      <h2>📝 Observações</h2>
      <button class="btn btn-blue" onclick="Views._showNoteModal()">+ Nova Observação</button>
    </div>
    <div class="alert alert-info">Registre observações pedagógicas e de supervisão sobre suas turmas.</div>
    ${notes.length===0?'<div class="card text-center text-muted"><p style="font-size:2rem">📝</p><p>Nenhuma observação registrada.</p></div>'
    :`<div class="notes-list">${notes.map(n=>{
      const g=groups.find(x=>x.id===n.groupId);
      return `<div class="note-item">
        <div class="flex-between mb-1"><strong>${n.title}</strong><span class="text-muted" style="font-size:.8rem">${fmtDate(n.createdAt)}</span></div>
        ${g?`<span class="badge badge-blue mb-1">👥 ${g.name}</span>`:''}
        <p style="font-size:.9rem;line-height:1.6">${n.content}</p>
        <button class="btn btn-danger btn-sm mt-1" onclick="Views._deleteNote('${n.id}')">Excluir</button>
      </div>`;
    }).join('')}</div>`}
  </div>`);
},
_showNoteModal(){
  const u=DB.currentUser();
  const groups=DB.list('groups').filter(g=>g.ownerId===u.id);
  document.body.insertAdjacentHTML('beforeend',`
  <div class="modal-overlay" id="nmod" onclick="if(event.target.id==='nmod')document.getElementById('nmod').remove()">
    <div class="modal-card">
      <div class="modal-header"><h3>Nova Observação</h3><button class="modal-close" onclick="document.getElementById('nmod').remove()">×</button></div>
      <div class="form-group"><label>Título</label><input id="n-title" placeholder="Resumo da observação"></div>
      ${groups.length?`<div class="form-group"><label>Turma (opcional)</label>
        <select id="n-group"><option value="">Geral</option>${groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}</select>
      </div>`:''}
      <div class="form-group"><label>Observação</label><textarea id="n-content" rows="5" placeholder="Descreva sua observação pedagógica..."></textarea></div>
      <button class="btn btn-blue" style="width:100%;justify-content:center" onclick="Views._addNote()">Salvar</button>
    </div>
  </div>`);
},
_addNote(){
  const u=DB.currentUser();
  const title=$('n-title')?.value.trim();
  const content=$('n-content')?.value.trim();
  if(!title||!content){toast('Preencha título e conteúdo.','error');return;}
  const note={id:DB.uid(),title,content,groupId:$('n-group')?.value||'',createdAt:new Date().toISOString()};
  const notes=DB.list('notes_'+u.id)||[];
  notes.unshift(note);DB.set('notes_'+u.id,notes);
  $('nmod')?.remove();toast('Observação salva!');nav('pro-notes');
},
_deleteNote(id){
  const u=DB.currentUser();
  const notes=(DB.list('notes_'+u.id)||[]).filter(x=>x.id!==id);
  DB.set('notes_'+u.id,notes);toast('Observação excluída.');nav('pro-notes');
},

// ---------- PRO PROFILE ----------
proProfile(){
  const u=DB.currentUser();
  if(!u||u.role!=='pro'){nav('landing');return;}
  const groups=DB.list('groups').filter(g=>g.ownerId===u.id);
  const chals=DB.list('challenges').filter(c=>groups.map(g=>g.id).includes(c.groupId));
  render(this._proNav('dash')+`
  <div style="padding:1.5rem;max-width:600px;margin:0 auto">
    <div class="card">
      <div style="width:70px;height:70px;border-radius:50%;background:var(--blue-light);color:#fff;font-size:1.8rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">${u.name[0].toUpperCase()}</div>
      <h2 class="text-center">${u.name}</h2>
      <p class="text-center text-muted">${u.email}</p>
      ${u.institution?`<p class="text-center" style="margin-top:.5rem"><span class="badge badge-blue">🏫 ${u.institution}</span></p>`:''}
      <div class="grid-2 mt-2">
        <div class="card" style="background:var(--blue-pale);text-align:center"><strong style="font-size:1.5rem;color:var(--blue)">${groups.length}</strong><br><span class="text-muted">Turmas</span></div>
        <div class="card" style="background:var(--green-pale);text-align:center"><strong style="font-size:1.5rem;color:var(--green)">${chals.length}</strong><br><span class="text-muted">Desafios</span></div>
      </div>
      <div class="mt-2 form-group">
        <label>Atualizar nome</label>
        <div style="display:flex;gap:.5rem">
          <input id="upd-name" value="${u.name}" placeholder="Novo nome">
          <button class="btn btn-blue" onclick="Views._updateProName()">Salvar</button>
        </div>
      </div>
      <button class="btn btn-danger mt-2" style="width:100%;justify-content:center" onclick="DB.logout();nav('landing')">Sair da conta</button>
    </div>
  </div>`);
},
_updateProName(){
  const u=DB.currentUser();
  const name=$('upd-name')?.value.trim();
  if(!name)return;
  u.name=name;DB.login(u);DB.update('users',u.id,{name});
  toast('Nome atualizado!');nav('pro-profile');
}

}; // end Views

// =========================================================
//  INIT
// =========================================================
render('<div class="landing"><div class="landing-logo">🥦</div><h2>Carregando NutriKids...</h2></div>');
(async function initApp(){
  await DB.init();
  const u=DB.currentUser();
  if(u){u.role==='kid'?nav('kid-dashboard'):nav('pro-dashboard');}
  else{nav('landing');}
})();
</script>
</body>
</html>
